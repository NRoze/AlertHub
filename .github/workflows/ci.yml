name: CI - Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore AlertHub.slnx

    - name: Build
      run: dotnet build AlertHub.slnx --no-restore

    - name: Test
      run: dotnet test AlertHub.slnx --no-build --verbosity normal