name: CI - Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # -----------------------------
  # Detect Changes
  # -----------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      function: ${{ steps.filter.outputs.function }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          if echo "$CHANGED" | grep -q '^AlertHub.React/'; then
            echo "react=true" >> $GITHUB_OUTPUT
          else
            echo "react=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -q '^AlertHub.Api/'; then
            echo "function=true" >> $GITHUB_OUTPUT
          else
            echo "function=false" >> $GITHUB_OUTPUT
          fi
  
  build-and-test-backend:
    needs: changes
    if: needs.changes.outputs.function == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore AlertHub.slnx

    - name: Build
      run: dotnet build AlertHub.slnx --no-restore

    - name: Test
      run: dotnet test AlertHub.slnx --no-build --verbosity normal

  verify-build-frontend:
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'AlertHub.React/package-lock.json'

      - name: Install Dependencies
        run: npm install
        working-directory: AlertHub.React

      - name: Type Check (Optional but Recommended)
        run: npx tsc --noEmit
        working-directory: AlertHub.React
        continue-on-error: true 

      - name: Build Project
        run: npm run build
        working-directory: AlertHub.React

      - name: Lint Check
        run: npm run lint
        working-directory: AlertHub.React
        continue-on-error: true