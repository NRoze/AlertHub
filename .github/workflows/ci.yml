name: CI - Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore AlertHub.slnx

    - name: Build
      run: dotnet build AlertHub.slnx --no-restore

    - name: Test
      run: dotnet test AlertHub.slnx --no-build --verbosity normal

  verify-build-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'AlertHub.React/package-lock.json'

      - name: Install Dependencies
        run: npm install
        working-directory: AlertHub.React

      - name: Type Check (Optional but Recommended)
        run: npx tsc --noEmit
        working-directory: AlertHub.React
        continue-on-error: true 

      - name: Build Project
        run: npm run build
        working-directory: AlertHub.React

      - name: Lint Check
        run: npm run lint
        working-directory: AlertHub.React
        continue-on-error: true