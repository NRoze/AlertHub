name: CD - Deploy Backend Apps on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  # -----------------------------
  # Detect Changes
  # -----------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      webapi: ${{ steps.filter.outputs.webapi }}
      function: ${{ steps.filter.outputs.function }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          BASE=${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}
          CHANGED=$(git diff --name-only $BASE $GITHUB_SHA)

          echo "webapi=$(echo "$CHANGED" | grep '^AlertHub.WebApi/' || true)" >> $GITHUB_OUTPUT
          echo "function=$(echo "$CHANGED" | grep '^AlertHub.Api/' || true)" >> $GITHUB_OUTPUT

  # -----------------------------
  # WebAPI
  # -----------------------------
  webapi:
    needs: changes
    if: needs.changes.outputs.webapi != ''
    runs-on: ubuntu-latest
    name: Deploy WebApi

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish WebApi
        run: |
          dotnet publish ./AlertHub.WebApi/AlertHub.WebApi.csproj \
            --configuration Release \
            --output ./publish/WebApi \
            --no-self-contained

      - name: Zip WebApi
        run: |
          cd ./publish/WebApi
          # Clean out any "leakage" from the Function project
          rm -f host.json functions.metadata worker.config.json
          zip -r ../../WebApi.zip .
          cd ../../

      - name: Deploy WebApi
        run: |
          az webapp deploy \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --src-path WebApi.zip \
            --type zip \
            --async true

      - name: Set WebApi Startup Command
        # This is critical. It tells Azure exactly which DLL to run.
        run: |
          az webapp config set \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --startup-file "dotnet AlertHub.WebApi.dll"

  # -----------------------------
  # Function App
  # -----------------------------
  function:
    needs: changes
    if: needs.changes.outputs.function != ''
    runs-on: ubuntu-latest
    name: Deploy Function App

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish Function
        run: |
          dotnet publish ./AlertHub.Api/AlertHub.Api.csproj \
            -c Release \
            -o ./publish/FunctionApp \
            /p:AppSettingsFile=appsettings.function.json

      - name: Zip Function
        run: |
          cd ./publish/FunctionApp
          # Prevent WebAPI or extra DLL leakage
          # Ensure host.json is at the root of this folder
          zip -r ../../FunctionApp.zip .
          cd ../../

      - name: Deploy Function
        run: |
          az functionapp deploy \
            --resource-group alert-hub-rg \
            --name alert-hub-api \
            --src-path FunctionApp.zip \
            --type zip \
            --async true


