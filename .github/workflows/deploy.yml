name: CD - Deploy Changed Apps on Tag

on:
  push:
    tags:
      - 'v*'

jobs:

  # -----------------------------
  # Detect Changes (shared job)
  # -----------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      webapi: ${{ steps.filter.outputs.webapi }}
      function: ${{ steps.filter.outputs.function }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        run: |
          echo "Detecting changes for tag: $GITHUB_REF"

          # Get previous tag (safe)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using initial commit"
            BASE=$(git rev-list --max-parents=0 HEAD)
          else
            echo "Previous tag: $PREV_TAG"
            BASE=$PREV_TAG
          fi

          echo "Diffing: $BASE -> $GITHUB_SHA"

          CHANGED=$(git diff --name-only $BASE $GITHUB_SHA)

          echo "Changed files:"
          echo "$CHANGED"

          REACT=$(echo "$CHANGED" | grep '^AlertHub.React/' || true)
          WEBAPI=$(echo "$CHANGED" | grep '^AlertHub.WebApi/' || true)
          FUNCTION=$(echo "$CHANGED" | grep '^AlertHub.Api/' || true)

          echo "react<<EOF" >> $GITHUB_OUTPUT
          echo "$REACT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "webapi<<EOF" >> $GITHUB_OUTPUT
          echo "$WEBAPI" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "function<<EOF" >> $GITHUB_OUTPUT
          echo "$FUNCTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # -----------------------------
  # React (Static Web App)
  # -----------------------------
  react:
    needs: changes
    if: needs.changes.outputs.react != ''
    runs-on: ubuntu-latest
    name: Deploy React App
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build React
        run: |
          cd AlertHub.React
          npm install
          npm run build

      - name: Deploy via Azure CLI
        run: |
          npm install -g @azure/static-web-apps-cli
          # 1. Move into the folder where the 'dist' actually lives
          cd AlertHub.React
          # 2. Run the deploy from INSIDE that folder pointing to 'dist'
          # 3. Explicitly provide the --app-name to replace the 'Missing Link'
          swa deploy ./dist \
            --app-name alert-hub-react \
            --deployment-token ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_FIELD_0B7BB1810 }} \
            --env production \
            --branch master \
            --verbose silly
