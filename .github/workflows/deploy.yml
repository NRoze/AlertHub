name: CD - Deploy Changed Apps on Tag

on:
  push:
    tags:
      - 'v*'

jobs:

  # -----------------------------
  # Detect Changes (shared job)
  # -----------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      react: ${{ steps.filter.outputs.react }}
      webapi: ${{ steps.filter.outputs.webapi }}
      function: ${{ steps.filter.outputs.function }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        run: |
          echo "Detecting changes for tag: $GITHUB_REF"

          # Get previous tag (safe)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          BASE=${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}
          
          # Get list of changed files
          CHANGED=$(git diff --name-only $BASE $GITHUB_SHA)

          # Check for changes in each directory
          # We use -q (quiet) to just check if the pattern exists
          echo "has_react=$(echo "$CHANGED" | grep -q '^AlertHub.React/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_webapi=$(echo "$CHANGED" | grep -q '^AlertHub.WebApi/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "has_function=$(echo "$CHANGED" | grep -q '^AlertHub.Api/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  # -----------------------------
  # React (Static Web App)
  # -----------------------------
  react:
    needs: changes
    if: needs.changes.outputs.react != ''
    runs-on: ubuntu-latest
    name: Deploy React App
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Install OIDC Client
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core');
            const token = await coredemo.getIDToken();
            coredemo.info(`Retrieved ID token: ${token.slice(0, 20)}...`);
            return token;
          result-encoding: string

      - name: Build And Deploy React
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_FIELD_0B7BB1810 }}
          action: "upload"
          app_location: "./AlertHub.React"
          output_location: "./AlertHub.React/dist"

  # -----------------------------
  # WebAPI
  # -----------------------------
  webapi:
    needs: changes
    if: needs.changes.outputs.webapi != ''
    runs-on: ubuntu-latest
    name: Deploy WebApi

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish WebApi
        run: |
          dotnet publish ./AlertHub.WebApi/AlertHub.WebApi.csproj \
            -c Release \
            -o $PWD/publish/WebApi \
            /p:AppSettingsFile=appsettings.webapi.json

      - name: Zip WebApi
        run: |
          cd ./publish/WebApi
          zip -r ../../WebApi.zip .
          cd ../../

      - name: Stop Web App (Prevents 502/File Locks)
        run: az webapp stop --name alert-hub-webapi --resource-group alert-hub-rg

      - name: Deploy WebApi
        run: |
          az webapp deploy \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --src-path WebApi.zip \
            --type zip \
            --timeout 600

      - name: Set startup command
        run: |
          az webapp config set \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --startup-file "dotnet AlertHub.WebApi.dll" \
            --linux-fx-version "DOTNET|10.0"
            
          az webapp update \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --https-only true

      - name: Start Web App
        run: az webapp start --name alert-hub-webapi --resource-group alert-hub-rg

  # -----------------------------
  # Function App
  # -----------------------------
  function:
    needs: changes
    if: needs.changes.outputs.function != ''
    runs-on: ubuntu-latest
    name: Deploy Function App

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish Function
        run: |
          dotnet publish ./AlertHub.Api/AlertHub.Api.csproj \
            -c Release \
            -o $PWD/publish/FunctionApp \
            /p:AppSettingsFile=appsettings.function.json

      - name: Zip Function
        run: |
          cd ./publish/FunctionApp
          zip -r ../../FunctionApp.zip .
          cd ../../

      - name: Deploy Function
        run: |
          az functionapp deploy \
            --resource-group alert-hub-rg \
            --name alert-hub-api \
            --src-path FunctionApp.zip \
            --type zip