name: CD - Deploy on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3

      # 2. Setup .NET 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      # ----- Function App Deployment -----
      - name: Publish Function App
        run: dotnet publish AlertHub.Api -c Release -o ./AlertHub.Api/publish

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: alert-hub-api
          package: ./AlertHub.Api/publish
          publish-profile: ${{ secrets.FUNCTIONAPP_PUBLISH_PROFILE }}

      # ----- WebApi Deployment (Linux ZIP) -----
      - name: Publish WebApi
        run: dotnet publish AlertHub.WebApi -c Release -o ./AlertHub.WebApi/publish

      - name: Zip WebApi
        run: zip -r WebApi.zip ./AlertHub.WebApi/publish

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy WebApi ZIP
        run: |
          az webapp deployment source config-zip \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --src WebApi.zip

