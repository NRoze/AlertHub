name: CD - Deploy on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout repository
      - uses: actions/checkout@v3

      # 2️ Setup .NET 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      # 3️ Azure Login using service principal
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ----- Function App Deployment -----
      - name: Publish Function App
        run: |
          dotnet publish ./AlertHub.Api/AlertHub.Api.csproj \
            -c Release \
            -o $PWD/publish/FunctionApp \
            /p:AppSettingsFile=appsettings.function.json

      - name: Zip Function App
        run: zip -r FunctionApp.zip ./publish/FunctionApp

      - name: Deploy Function App ZIP
        run: |
          az functionapp deployment source config-zip \
            --resource-group alert-hub-rg \
            --name alert-hub-api \
            --src FunctionApp.zip

      # ----- WebApi Deployment -----
      - name: Publish WebApi
        run: |
          dotnet publish ./AlertHub.WebApi/AlertHub.WebApi.csproj \
            -c Release \
            -o $PWD/publish/WebApi \
            /p:AppSettingsFile=appsettings.webapi.json

      - name: Zip WebApi
        run: zip -r WebApi.zip ./publish/WebApi

      - name: Deploy WebApi ZIP
        run: |
          az webapp deployment source config-zip \
            --resource-group alert-hub-rg \
            --name alert-hub-webapi \
            --src WebApi.zip

      # # ----- SSE Endpoint Verification -----
      # - name: Verify SSE Endpoint
      #   run: |
      #     URL="https://alert-hub-webapi.azurewebsites.net/sse-endpoint"
      #     HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
      #     if [ "$HTTP_STATUS" -ne 200 ]; then
      #       echo "❌ SSE endpoint check failed with status $HTTP_STATUS"
      #       exit 1
      #     fi
      #     echo "✅ SSE endpoint is live!"

      # ----- Optional Cleanup -----
      - name: Cleanup build artifacts
        run: rm -rf ./publish ./FunctionApp.zip ./WebApi.zip