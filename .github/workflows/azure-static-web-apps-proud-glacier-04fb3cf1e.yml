name: Azure Static Web Apps CI/CD (React Only)

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
          fetch-depth: 0 # Needed to find the previous tag

      - name: Check for React Changes
        id: check_react
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          BASE=${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}
          # Check if any files in the React folder changed
          if git diff --name-only $BASE $GITHUB_SHA | grep -q '^AlertHub.React/'; then
            echo "run_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "run_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Build And Deploy
        if: steps.check_react.outputs.run_deploy == 'true'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_GLACIER_04FB3CF1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./AlertHub.React"
          output_location: "dist"
          # Ensures the deployment targets the production slot even when triggered by a tag
          deployment_environment: "production" 
          production_branch: "master"
